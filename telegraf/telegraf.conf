# telegrafの設定サンプル
[agent]
  interval = "30s"
  flush_interval = "10s"
  debug = true

[[inputs.snmp]]
  agents = ["udp://192.168.1.10:161"]
  version = 2
  community = "${SNMP_COMMUNITY}"
  timeout = "5s"
  retries = 2
  agent_host_tag = "source"

  [[inputs.snmp.field]]
    name = "HOST_NAME"
    oid  = "1.3.6.1.2.1.1.5.0"
    is_tag = true

  # UCD-SNMP-MIB CPU (system avg)
  [[inputs.snmp.field]]
    name = "ssCpuRawUser"
    oid  = "1.3.6.1.4.1.2021.11.50"

  [[inputs.snmp.field]]
    name = "ssCpuRawNice"
    oid  = "1.3.6.1.4.1.2021.11.51"

  [[inputs.snmp.field]]
    name = "ssCpuRawSystem"
    oid  = "1.3.6.1.4.1.2021.11.52"

  [[inputs.snmp.field]]
    name = "ssCpuRawWait"
    oid  = "1.3.6.1.4.1.2021.11.54"

  [[inputs.snmp.field]]
    name = "ssCpuRawInterrupt"
    oid  = "1.3.6.1.4.1.2021.11.56"

  [[inputs.snmp.field]]
    name = "ssCpuRawSoftIRQ"
    oid  = "1.3.6.1.4.1.2021.11.61"

  [[inputs.snmp.field]]
    name = "ssCpuRawKernel"
    oid  = "1.3.6.1.4.1.2021.11.55"

  [[inputs.snmp.field]]
    name = "ssCpuRawIdle"
    oid  = "1.3.6.1.4.1.2021.11.53"

  [[inputs.snmp.field]]
    name = "ssCpuRawSteal"
    oid  = "1.3.6.1.4.1.2021.11.64"

  # HOST-RESOURCES-MIB CPU (per core)
  [[inputs.snmp.table]]
    name = "CPU LA (per core)"

    [[inputs.snmp.table.field]]
      name = "hrDeviceDescr"
      oid  = "1.3.6.1.2.1.25.3.2.1.3"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "hrProcessorLoad"
      oid  = "1.3.6.1.2.1.25.3.3.1.2"

  # UCD-SNMP-MIB MEM
  [[inputs.snmp.field]]
    name = "memTotalReal"
    oid  = "1.3.6.1.4.1.2021.4.5"

  [[inputs.snmp.field]]
    name = "memAvailReal"
    oid  = "1.3.6.1.4.1.2021.4.6"

  [[inputs.snmp.field]]
    name = "memBuffer"
    oid  = "1.3.6.1.4.1.2021.4.14"

  [[inputs.snmp.field]]
    name = "memCached"
    oid  = "1.3.6.1.4.1.2021.4.15"

  [[inputs.snmp.field]]
    name = "memShared"
    oid  = "1.3.6.1.4.1.2021.4.13"

  [[inputs.snmp.field]]
    name = "memUsedRealTXT"
    oid  = "1.3.6.1.4.1.2021.4.17"

  [[inputs.snmp.field]]
    name = "memTotalSwap"
    oid  = "1.3.6.1.4.1.2021.4.3"

  [[inputs.snmp.field]]
    name = "memAvailSwap"
    oid  = "1.3.6.1.4.1.2021.4.4"

  [[inputs.snmp.field]]
    name = "memUsedSwapTXT"
    oid  = "1.3.6.1.4.1.2021.4.16"

  # UCD-SNMP-MIB I/O (System)
  [[inputs.snmp.field]]
    name = "ssIORawReceived"
    oid  = "1.3.6.1.4.1.2021.11.58"

  [[inputs.snmp.field]]
    name = "ssIORawSent"
    oid  = "1.3.6.1.4.1.2021.11.57"

  # UCD-SNMP-MIB I/O (SWAP)
  [[inputs.snmp.field]]
    name = "ssSwapIn"
    oid  = "1.3.6.1.4.1.2021.11.3"

  [[inputs.snmp.field]]
    name = "ssSwapOut"
    oid  = "1.3.6.1.4.1.2021.11.4"

  # UCD-SNMP-MIB Load Average
  [[inputs.snmp.table]]
    name = "load average"

    [[inputs.snmp.table.field]]
      name = "laIndex"
      oid  = "1.3.6.1.4.1.2021.10.1.1"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "laLoad"
      oid  = "1.3.6.1.4.1.2021.10.1.3"  

  # UCD-SNMP-MIB DISK I/O
  [[inputs.snmp.table]]
    name = "diskIO"

    [[inputs.snmp.table.field]]
      name = "diskIOIndex"
      oid  = "1.3.6.1.4.1.2021.13.15.1.1.1"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "diskIODevice"
      oid  = "1.3.6.1.4.1.2021.13.15.1.1.2"

    [[inputs.snmp.table.field]]
      name = "diskIONRead"
      oid  = "1.3.6.1.4.1.2021.13.15.1.1.3"

    [[inputs.snmp.table.field]]
      name = "diskIONWritten"
      oid  = "1.3.6.1.4.1.2021.13.15.1.1.4"

    [[inputs.snmp.table.field]]
      name = "diskIOReads"
      oid  = "1.3.6.1.4.1.2021.13.15.1.1.5"

    [[inputs.snmp.table.field]]
      name = "diskIOWrites"
      oid  = "1.3.6.1.4.1.2021.13.15.1.1.6"

  # HOST-RESOURCES-MIB FileSystem Usage
  [[inputs.snmp.table]]
    name = "filesystem usage"

    [[inputs.snmp.table.field]]
      name = "hrStorageIndex"
      oid  = "1.3.6.1.2.1.25.2.3.1.1"
      is_tag = true
    
    [[inputs.snmp.table.field]]
      name = "hrStorageType"
      oid  = "1.3.6.1.2.1.25.2.3.1.2"
    
    [[inputs.snmp.table.field]]
      name = "hrStorageAllocationUnits"
      oid  = "1.3.6.1.2.1.25.2.3.1.4"
    
    [[inputs.snmp.table.field]]
      name = "hrStorageSize"
      oid  = "1.3.6.1.2.1.25.2.3.1.5"
    
    [[inputs.snmp.table.field]]
      name = "hrStorageUsed"
      oid  = "1.3.6.1.2.1.25.2.3.1.6"
    

  # UCD-SNMP-MIB Login
  [[inputs.snmp.field]]
    name = "ssCpuUser"
    oid  = "1.3.6.1.4.1.2021.11.9"

  # IF-MIB
  [[inputs.snmp.table]]
    name = "Interface Information"

    [[inputs.snmp.table.field]]
      name = "ifIndex"
      oid  = "1.3.6.1.2.1.2.2.1.1"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "ifName"
      oid  = "1.3.6.1.2.1.31.1.1.1.1"

    [[inputs.snmp.table.field]]
      name = "ifHCInOctets"
      oid  = "1.3.6.1.2.1.31.1.1.1.6"

    [[inputs.snmp.table.field]]
      name = "ifHCOutOctets"
      oid  = "1.3.6.1.2.1.31.1.1.1.10"

[[outputs.influxdb_v2]]
  urls = ["${INFLUX_URL}"]
  token = "${INFLUX_TOKEN}"
  organization = "${INFLUX_ORG}"
  bucket = "${INFLUX_BUCKET}"
